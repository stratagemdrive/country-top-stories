name: Build country_headlines.json

on:
  schedule:
    # Runs every 12 hours — at 00:00 UTC and 12:00 UTC
    - cron: "0 0,12 * * *"
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build country_headlines.json
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python scripts/build_country_headlines.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/country_headlines.json
          git diff --cached --quiet || git commit -m "chore: update country_headlines.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push origin main
