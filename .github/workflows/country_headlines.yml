name: Build country_headlines.json

on:
  schedule:
    # Runs every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so git pull --rebase works cleanly
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build country_headlines.json
        run: |
          python scripts/build_country_headlines.py --once

      - name: Copy to docs for GitHub Pages
        run: |
          mkdir -p docs
          cp public/country_headlines.json docs/country_headlines.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the main output, the docs copy, AND the archive folder
          # (archive must be committed so the next run inherits seen-article history)
          git add public/country_headlines.json \
                  docs/country_headlines.json \
                  public/archive/

          git diff --cached --quiet || git commit -m "chore: update country_headlines.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          # Pull any concurrent changes before pushing
          git pull --rebase origin main
          git push origin main
